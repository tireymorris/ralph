name: CI

on:
  push:
    branches: [ main, 'feature/**' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Build web UI
      run: npm ci && npm run build
      working-directory: web

    - name: Frontend unit tests
      run: npm test
      working-directory: web

    - uses: actions/setup-go@v4
      with:
        go-version: 1.24.0

    - name: Go unit tests
      run: go test ./... -cover -ldflags "$(./scripts/version-ldflags.sh)"

    - name: Go integration tests
      run: go test -tags=integration -timeout 2m -run TestWebIntegration ./... -ldflags "$(./scripts/version-ldflags.sh)"

  e2e:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 22

    - uses: actions/setup-go@v4
      with:
        go-version: 1.24.0

    - name: Build web UI
      run: npm ci && VITE_RUN_STALL_THRESHOLD_MS=3000 npm run build
      working-directory: web

    - name: Build Go binary
      run: ./scripts/build.sh -o .ralph-e2e-bin

    - name: Install E2E dependencies
      run: npm ci
      working-directory: e2e

    - name: Install Playwright browsers
      run: npx playwright install chromium --with-deps
      working-directory: e2e

    - name: E2E tests
      run: npm test
      working-directory: e2e
      env:
        SKIP_BUILD: "1"
